<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6e624c"/></marker>
  </defs>
  <rect width="900" height="280" fill="#f3ece0"/>
  <text x="450" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#2d2418">Co se děje v tahu hráče</text>

  <!-- Step 1: Hod -->
  <g transform="translate(50, 80)">
    <rect width="160" height="110" rx="10" fill="#fff5e0" stroke="#b86e3a" stroke-width="2"/>
    <text x="80" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#8e4f25">1. HOD KOSTKAMI</text>
    <text x="80" y="56" text-anchor="middle" font-size="24">🎲 🎲 🎲</text>
    <text x="80" y="80" text-anchor="middle" font-size="11" fill="#6e624c">Hod všemi kostkami</text>
    <text x="80" y="94" text-anchor="middle" font-size="11" fill="#6e624c">v Ruce, sečti součet</text>
  </g>

  <!-- Or skip -->
  <g transform="translate(50, 210)">
    <rect width="160" height="48" rx="10" fill="#f5efe0" stroke="#7a6a4c" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="80" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#6e624c">nebo „Neházej":</text>
    <text x="80" y="38" text-anchor="middle" font-size="12" fill="#6e624c">+ 2 🥔, tah skončí</text>
  </g>

  <!-- Arrow -->
  <line x1="220" y1="135" x2="280" y2="135" stroke="#6e624c" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: Choose action -->
  <g transform="translate(290, 60)">
    <rect width="280" height="160" rx="10" fill="#fff5e0" stroke="#b86e3a" stroke-width="2"/>
    <text x="140" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#8e4f25">2. VYBER AKCI</text>

    <g transform="translate(20, 50)">
      <rect width="100" height="36" rx="8" fill="#c6e9b8" stroke="#4a8a2a"/>
      <text x="50" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#2d4f1a">🐾 Pohyb</text>
    </g>
    <g transform="translate(140, 50)">
      <rect width="120" height="36" rx="8" fill="#c6e9b8" stroke="#4a8a2a"/>
      <text x="60" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#2d4f1a">🌿 Využij pole</text>
    </g>
    <g transform="translate(80, 100)">
      <rect width="120" height="36" rx="8" fill="#c6e9b8" stroke="#4a8a2a"/>
      <text x="60" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#2d4f1a">💤 Spánek</text>
    </g>
  </g>

  <!-- Arrow -->
  <line x1="580" y1="135" x2="640" y2="135" stroke="#6e624c" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: End -->
  <g transform="translate(650, 80)">
    <rect width="180" height="110" rx="10" fill="#fff5e0" stroke="#b86e3a" stroke-width="2"/>
    <text x="90" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#8e4f25">3. KONEC TAHU</text>
    <text x="90" y="60" text-anchor="middle" font-size="32">⏭️</text>
    <text x="90" y="84" text-anchor="middle" font-size="11" fill="#6e624c">Na řadě další hráč</text>
  </g>

  <!-- Special note for Sprint -->
  <text x="450" y="248" text-anchor="middle" font-size="11" fill="#6e624c" font-style="italic">
    Výjimka: s dovedností <tspan font-weight="700">Sprint</tspan> můžeš v jednom tahu Pohyb + Využij pole.
  </text>
</svg>
