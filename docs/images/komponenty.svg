<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <filter id="csh"><feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="900" height="280" fill="#f3ece0"/>
  <text x="450" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#2d2418">Komponenty hráče</text>

  <!-- Vombat figurka -->
  <g transform="translate(75, 130)" filter="url(#csh)">
    <circle r="32" fill="#1a0e02"/>
    <circle r="27" fill="#d94a4a" stroke="#fff" stroke-width="2"/>
    <circle r="20" fill="#fff8dc"/>
    <text y="8" text-anchor="middle" font-size="24">🐾</text>
  </g>
  <text x="75" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#2d2418">Vombat figurka</text>
  <text x="75" y="218" text-anchor="middle" font-size="11" fill="#6e624c">tvoje postava</text>
  <text x="75" y="234" text-anchor="middle" font-size="11" fill="#6e624c">na mapě</text>

  <!-- Bobek -->
  <g transform="translate(220, 130)" filter="url(#csh)">
    <path d="M -22 -12 L 22 -12 L 22 12 L 0 22 L -22 12 Z" fill="#d94a4a" stroke="#1a0e02" stroke-width="2"/>
    <text y="3" text-anchor="middle" font-size="20">💩</text>
  </g>
  <text x="220" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#2d2418">Bobek 💩</text>
  <text x="220" y="218" text-anchor="middle" font-size="11" fill="#6e624c">značka pole po jiné</text>
  <text x="220" y="234" text-anchor="middle" font-size="11" fill="#6e624c">akci než Zasaď</text>

  <!-- Mrkev -->
  <g transform="translate(365, 130)" filter="url(#csh)">
    <path d="M -22 -12 L 22 -12 L 22 12 L 0 22 L -22 12 Z" fill="#d94a4a" stroke="#1a0e02" stroke-width="2"/>
    <text y="3" text-anchor="middle" font-size="20">🥕</text>
  </g>
  <text x="365" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#2d2418">Mrkev 🥕</text>
  <text x="365" y="218" text-anchor="middle" font-size="11" fill="#6e624c">značka po akci</text>
  <text x="365" y="234" text-anchor="middle" font-size="11" fill="#6e624c">„Zasaď"</text>

  <!-- Brambora -->
  <g transform="translate(510, 130)" filter="url(#csh)">
    <ellipse rx="24" ry="18" fill="#d2a86c" stroke="#5a3a18" stroke-width="2"/>
    <circle cx="-8" cy="-4" r="1.5" fill="#5a3a18"/>
    <circle cx="6" cy="2" r="1.5" fill="#5a3a18"/>
    <circle cx="-4" cy="8" r="1.5" fill="#5a3a18"/>
  </g>
  <text x="510" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#2d2418">Brambora 🥔</text>
  <text x="510" y="218" text-anchor="middle" font-size="11" fill="#6e624c">měna a obrana</text>
  <text x="510" y="234" text-anchor="middle" font-size="11" fill="#6e624c">začínáš s 10</text>

  <!-- Kostky -->
  <g transform="translate(680, 130)" filter="url(#csh)">
    <!-- k4 (triangle) -->
    <g transform="translate(-50, 0)">
      <path d="M 0 -16 L 14 10 L -14 10 Z" fill="#f7d758" stroke="#7a5810" stroke-width="1.5"/>
      <text y="6" text-anchor="middle" font-size="9" font-weight="800">4</text>
    </g>
    <!-- k6 (square) -->
    <g transform="translate(-18, 0)">
      <rect x="-12" y="-12" width="24" height="24" rx="3" fill="#4a8fcc" stroke="#163d6e" stroke-width="1.5"/>
      <text y="4" text-anchor="middle" font-size="10" font-weight="800" fill="#fff">6</text>
    </g>
    <!-- k8 (diamond) -->
    <g transform="translate(14, 0)">
      <path d="M 0 -13 L 12 0 L 0 13 L -12 0 Z" fill="#c84030" stroke="#5a0e08" stroke-width="1.5"/>
      <text y="3" text-anchor="middle" font-size="10" font-weight="800" fill="#fff">8</text>
    </g>
    <!-- k12 -->
    <g transform="translate(48, 0)">
      <path d="M 0 -14 L 12 -6 L 12 6 L 0 14 L -12 6 L -12 -6 Z" fill="#7a3aa0" stroke="#3a0e58" stroke-width="1.5"/>
      <text y="4" text-anchor="middle" font-size="10" font-weight="800" fill="#fff">12</text>
    </g>
  </g>
  <text x="680" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#2d2418">Kostky</text>
  <text x="680" y="218" text-anchor="middle" font-size="11" fill="#6e624c">k2/k4/k6/k8/k12/k20</text>
  <text x="680" y="234" text-anchor="middle" font-size="11" fill="#6e624c">tvůj arzenál pro hod</text>
</svg>
